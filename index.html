<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to 7pm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #000 url("hollywoodbowl.avif") center / cover no-repeat fixed;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
  }

  /* Dark overlay so the text stays readable over the image */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  h1 {
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5em;
    opacity: 0.9;
  }

  #countdown {
    display: flex;
    gap: clamp(1rem, 5vw, 4rem);
    justify-content: center;
    align-items: flex-start;
  }

  .unit { display: flex; flex-direction: column; align-items: center; }

  .number {
    font-size: clamp(3rem, 18vw, 12rem);
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .label {
    font-size: clamp(0.7rem, 2vw, 1.1rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.5em;
    opacity: 0.8;
  }

  #message {
    font-size: clamp(2rem, 8vw, 6rem);
    font-weight: 700;
    display: none;
  }

  #fsBtn, #musicBtn {
    position: fixed;
    bottom: 1.5rem;
    z-index: 2;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: #fff;
    padding: 0.6em 1.2em;
    border-radius: 999px;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }

  #fsBtn { right: 1.5rem; }
  #musicBtn { right: 11rem; }

  #fsBtn:hover, #musicBtn:hover { background: rgba(255, 255, 255, 0.3); }

  #credit {
    position: fixed;
    bottom: 0.6rem;
    left: 1rem;
    z-index: 2;
    font-size: 0.7rem;
    opacity: 0.6;
  }

  #credit a { color: #fff; }
</style>
</head>
<body>
  <div class="content">
    <h1>Concert Begins in...</h1>
    <div id="countdown">
      <div class="unit"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
      <div class="unit"><span class="number" id="minutes">00</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="number" id="seconds">00</span><span class="label">Seconds</span></div>
    </div>
    <div id="message">It's 7 PM! 🎉</div>
  </div>

  <div id="credit">
    Music: <a href="https://archive.org/details/BrylieChristopherOxleyMorningBirdsong" target="_blank" rel="noopener">"Morning Birdsong"</a>
    by Brylie Christopher Oxley,
    <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
  </div>

  <audio id="bgAudio" src="https://archive.org/download/BrylieChristopherOxleyMorningBirdsong/BrylieChristopherOxley-morning_birdsong.mp3" loop crossorigin="anonymous"></audio>

  <button id="musicBtn">🔇 Play Sound</button>
  <button id="fsBtn">⛶ Fullscreen</button>

  <script>
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const countdownEl = document.getElementById("countdown");
    const messageEl = document.getElementById("message");

    const pad = (n) => String(n).padStart(2, "0");

    function target() {
      const now = new Date();
      const t = new Date(now);
      t.setHours(19, 0, 0, 0); // 7:00:00 PM today
      if (now >= t) t.setDate(t.getDate() + 1); // already past 7pm -> tomorrow
      return t;
    }

    function tick() {
      const now = new Date();
      const t = target();
      let diff = Math.floor((t - now) / 1000);

      // Brief celebration in the minute right after 7pm
      if (now.getHours() === 19 && now.getMinutes() === 0) {
        countdownEl.style.display = "none";
        messageEl.style.display = "block";
        return;
      }
      countdownEl.style.display = "flex";
      messageEl.style.display = "none";

      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;

      hoursEl.textContent = pad(h);
      minutesEl.textContent = pad(m);
      secondsEl.textContent = pad(s);
    }

    tick();
    setInterval(tick, 250);

    // Fullscreen toggle
    const fsBtn = document.getElementById("fsBtn");
    fsBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fsBtn.textContent = document.fullscreenElement ? "⛶ Exit Fullscreen" : "⛶ Fullscreen";
    });

    // Background music
    const audio = document.getElementById("bgAudio");
    const musicBtn = document.getElementById("musicBtn");
    audio.volume = 0.5;

    function updateMusicBtn() {
      musicBtn.textContent = audio.paused ? "🔇 Play Sound" : "🔊 Pause Sound";
    }

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }

    musicBtn.addEventListener("click", toggleMusic);
    audio.addEventListener("play", updateMusicBtn);
    audio.addEventListener("pause", updateMusicBtn);

    // Try to start music on the first interaction anywhere (autoplay-with-sound is blocked)
    function startOnFirstInteraction() {
      audio.play().catch(() => {});
      document.removeEventListener("click", startOnFirstInteraction);
      document.removeEventListener("keydown", startOnFirstInteraction);
    }
    document.addEventListener("click", startOnFirstInteraction);
    document.addEventListener("keydown", startOnFirstInteraction);
  </script>
</body>
</html>
